# Conda environment for the alpha-zein (A8HNE1) MD analysis pipeline.
#   conda env create -f environment.yml
#   conda activate zein-md
#
# conda-forge provides pre-built wheels for rdkit / mdtraj / MDAnalysis, which is
# the most reliable way to install the interaction-fingerprint stack.
name: zein-md
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - tqdm>=4.65
  - pyyaml>=6.0
  - scikit-learn>=1.3
  - networkx>=3.0
  - mdanalysis>=2.7
  - mdtraj>=1.10
  - rdkit>=2023.3
  - pip
  - pip:
      - panedr>=0.8
      - prolif>=2.0
